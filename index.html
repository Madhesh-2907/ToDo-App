<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskFlow | Todo App</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>TaskFlow</h1>

        <p>Organize your daily tasks efficiently</p>

        <div class="input-section">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter a new task..."
            >

            <button id="addBtn">
                Add Task
            </button>

        </div>

        <div class="task-info">

            <span>Total Tasks :
                <span id="totalTasks">0</span>
            </span>

            <span>Completed :
                <span id="completedTasks">0</span>
            </span>

        </div>

        <ul id="taskList">

        </ul>

        <button id="clearBtn">
            Clear All Tasks
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
